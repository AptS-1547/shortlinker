name: Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY_IMAGE_DOCKERHUB: e1saps/shortlinker
  REGISTRY_IMAGE_GHCR: ghcr.io/apts-1547/shortlinker

jobs:
  build-and-push:
    name: Build and push ${{ matrix.variant }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            features: cli
            suffix: ""
          - variant: metrics
            features: cli,metrics
            suffix: "-metrics"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_IMAGE_DOCKERHUB }}
            ${{ env.REGISTRY_IMAGE_GHCR }}
          tags: |
            type=ref,event=tag,suffix=${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=stable${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=edge${{ matrix.suffix }},enable=${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
            type=semver,pattern=v{{major}},suffix=${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
          labels: |
            org.opencontainers.image.title=Shortlinker
            org.opencontainers.image.description=A simple, fast, and secure URL shortener written in Rust
            org.opencontainers.image.vendor=AptS-1547

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=docker-image-${{ matrix.variant }}
            type=registry,ref=${{ env.REGISTRY_IMAGE_GHCR }}:buildcache-${{ matrix.variant }}
          cache-to: |
            type=gha,mode=max,scope=docker-image-${{ matrix.variant }}
            type=registry,ref=${{ env.REGISTRY_IMAGE_GHCR }}:buildcache-${{ matrix.variant }},mode=max
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            CARGO_FEATURES=${{ matrix.features }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker images
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes "${REGISTRY_IMAGE_DOCKERHUB}@${DIGEST}"
          cosign sign --yes "${REGISTRY_IMAGE_GHCR}@${DIGEST}"

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Docker Build Summary (${{ matrix.variant }})"
            echo "- **Features**: ${{ matrix.features }}"
            echo "- **Version**: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"
            echo "- **Platform**: linux/amd64"
            echo "- **Docker Hub**: ${{ env.REGISTRY_IMAGE_DOCKERHUB }}"
            echo "- **GHCR**: ${{ env.REGISTRY_IMAGE_GHCR }}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
