name: Rust CI

on:
  push:
    branches: [master]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'admin-panel/generated/openapi.json'
      - 'admin-panel/src/services/api.generated.ts'
      - 'admin-panel/package.json'
      - 'admin-panel/bun.lock'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'admin-panel/generated/openapi.json'
      - 'admin-panel/src/services/api.generated.ts'
      - 'admin-panel/package.json'
      - 'admin-panel/bun.lock'
      - '.github/workflows/rust.yml'

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  CARGO_PROFILE_TEST_CODEGEN_UNITS: '16'
  CARGO_PROFILE_TEST_DEBUG: '0'

jobs:
  format-and-clippy:
    name: Format and Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy-v1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  openapi-contract:
    name: OpenAPI contract drift
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: openapi-v1

      - name: Generate OpenAPI specification
        run: cargo test --features openapi --test generate_openapi

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install admin panel dependencies
        working-directory: admin-panel
        run: bun install --frozen-lockfile --registry https://registry.npmjs.org

      - name: Generate TypeScript API types
        working-directory: admin-panel
        run: bun run generate-api

      - name: Verify generated contract files
        run: |
          git diff --exit-code -- \
            admin-panel/generated/openapi.json \
            admin-panel/src/services/api.generated.ts

  tests-and-coverage:
    name: Tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage-v1

      - name: Prepare coverage directory
        run: mkdir -p coverage/rust

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --no-fail-fast --lcov --output-path coverage/rust/lcov.info

      - name: Generate HTML coverage report
        if: success()
        run: cargo llvm-cov report --html --output-dir coverage/rust/html

      - name: Upload coverage reports to Codecov
        if: always() && hashFiles('coverage/rust/lcov.info') != ''
        uses: codecov/codecov-action@v7
        with:
          files: coverage/rust/lcov.info
          flags: rust
          name: rust-backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          if-no-files-found: ignore
          path: coverage/rust
