name: Security Audit

on:
  push:
    branches: [master]
    paths:
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'admin-panel/package.json'
      - 'admin-panel/bun.lock'
      - 'docs/package.json'
      - 'docs/bun.lock'
      - '.cargo/audit.toml'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'admin-panel/package.json'
      - 'admin-panel/bun.lock'
      - 'docs/package.json'
      - 'docs/bun.lock'
      - '.cargo/audit.toml'
      - '.github/workflows/audit.yml'
  schedule:
    # Every Monday at 09:17 UTC (17:17 Asia/Shanghai).
    - cron: '17 9 * * 1'
  workflow_dispatch:

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit -D warnings

  admin-panel-audit:
    name: Admin panel dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile --registry https://registry.npmjs.org

      - name: Run critical dependency audit
        run: bun audit --audit-level=critical

  docs-audit:
    name: Docs dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile --registry https://registry.npmjs.org

      - name: Run critical dependency audit
        run: bun audit --audit-level=critical
