name: Admin Panel CI

on:
  push:
    branches: [master]
    paths:
      - 'admin-panel/**'
      - '.github/workflows/admin-panel.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'admin-panel/**'
      - '.github/workflows/admin-panel.yml'

concurrency:
  group: admin-panel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-tests:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile --registry https://registry.npmjs.org

      - name: Check
        run: bun run check

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: Upload coverage reports to Codecov
        if: always() && hashFiles('admin-panel/coverage/coverage-final.json') != ''
        uses: codecov/codecov-action@v7
        with:
          files: admin-panel/coverage/coverage-final.json
          flags: frontend
          name: admin-panel
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: admin-panel-coverage
          if-no-files-found: ignore
          path: admin-panel/coverage
