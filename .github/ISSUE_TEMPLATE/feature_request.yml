name: Feature Request
description: Suggest a new capability or improvement for Shortlinker
title: "[Feature]: "
labels: ["Enhancement", "Wait For More Info"]
assignees:
  - AptS-1547
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete limitation or user problem you want to address.
      placeholder: When I need to ..., the current behavior ..., which means ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the expected behavior, interaction, or API rather than only naming the feature.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Short links / redirects
        - HTTP / Admin API
        - Admin Panel
        - CLI
        - Configuration / migrations
        - Authentication / security
        - Performance / observability
        - Docker / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Give one or two concrete examples of who would use this and when.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any current workaround and why it is insufficient.

  - type: textarea
    id: implementation
    attributes:
      label: Implementation notes
      description: Share relevant code paths, compatibility constraints, or implementation ideas if known.

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature
        - label: I can help test and provide feedback
        - label: I can help update the documentation

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions for similar requests
          required: true
        - label: This request is broadly useful and not specific to one private deployment
          required: true
