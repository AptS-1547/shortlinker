name: Bug Report
description: Report a reproducible problem in Shortlinker
title: "[Bug]: "
labels: ["Bug", "Wait For More Info"]
assignees:
  - AptS-1547
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Remove passwords, tokens, cookies, database credentials, and private hostnames from all logs and configuration snippets.

  - type: input
    id: version
    attributes:
      label: Shortlinker version
      description: Provide the release version, Docker tag, or commit SHA that exhibits the problem.
      placeholder: e.g. v0.5.2, stable, or 1a2b3c4
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Short-link redirect / HTTP API
        - Admin Panel
        - CLI / TUI
        - Configuration
        - Database / migrations
        - Docker / deployment
        - Metrics / observability
        - Other or not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and its user-visible impact.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Docker / Docker Compose
        - Pre-built binary from GitHub Releases
        - Homebrew
        - Cargo Binstall
        - Built from source
        - Other
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database backend
      options:
        - SQLite
        - PostgreSQL
        - MySQL
        - Not database-related
        - Not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS / distribution:
        - CPU architecture:
        - Browser (for Admin Panel issues):
        - Reverse proxy:
        - Other deployment details:

  - type: textarea
    id: logs
    attributes:
      label: Error messages / logs
      description: Include only logs related to the problem and remove sensitive values before posting.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Include only relevant settings and replace sensitive values with placeholders.
      render: toml

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, recordings, a minimal reproduction, or troubleshooting results if available.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have checked the relevant documentation and troubleshooting guides
          required: true
        - label: I have removed credentials and other sensitive information from this report
          required: true
