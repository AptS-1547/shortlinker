name: Question
description: Ask about installing, configuring, or using Shortlinker
title: "[Question]: "
labels: ["Wait For More Info"]
assignees:
  - AptS-1547
body:
  - type: markdown
    attributes:
      value: |
        General discussion and experience sharing are better suited to [Discussions](https://github.com/AptS-1547/shortlinker/discussions). Use the bug report form for reproducible unexpected behavior.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Explain what you are trying to accomplish and where you are stuck.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Installation / deployment
        - Configuration
        - Short links / HTTP API
        - Admin Panel
        - CLI / TUI
        - Docker
        - Reverse proxy
        - Troubleshooting
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Shortlinker version
      description: Provide the release version, Docker tag, or commit SHA you are using.
      placeholder: e.g. v0.5.2, stable, or 1a2b3c4
    validations:
      required: true

  - type: textarea
    id: what-tried
    attributes:
      label: What have you tried?
      description: List the documentation, commands, and troubleshooting steps you have already tried.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS / distribution:
        - Installation method:
        - Database backend:
        - Reverse proxy:

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove passwords, tokens, cookies, and database credentials before posting.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked the project documentation
          required: true
        - label: I have searched existing issues and discussions
          required: true
